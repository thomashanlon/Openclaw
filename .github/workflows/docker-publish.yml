name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream OpenClaw version tag
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          # Check if Dockerfile pins a specific (non-latest) tag
          from_ref="$(awk 'toupper($1) == "FROM" { print $2; exit }' Dockerfile)"
          if [ -z "$from_ref" ]; then
            echo "::error::Could not find a FROM image in Dockerfile"
            exit 1
          fi

          base_ref="${from_ref%%@*}"
          if [[ "$base_ref" == *:* ]]; then
            base_tag="${base_ref##*:}"
            if [ "$base_tag" != "latest" ]; then
              echo "version_tag=$base_tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Dockerfile uses :latest — resolve from upstream GitHub releases
          version_tag="$(gh api repos/openclaw/openclaw/releases/latest --jq '.tag_name | ltrimstr("v")')"
          if [ -z "$version_tag" ]; then
            echo "::error::Could not resolve latest release from openclaw/openclaw"
            exit 1
          fi

          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ steps.upstream.outputs.version_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.upstream.outputs.version_tag }}
        run: |
          tag="v${VERSION_TAG}"
          name="openclaw ${VERSION_TAG}"

          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
          else
            gh release create "$tag" \
              --title "$name" \
              --generate-notes \
              --target "${{ github.sha }}"
          fi
